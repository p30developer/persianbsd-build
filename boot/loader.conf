# ZFS support
zfs_load="YES"
cryptodev_load="YES"

# USB input support
hw.usb.usbhid.enable="1"
usbhid_load="YES"

# Root mount stability (optional for live ISO)
vfs.root_mount_always_wait="1"
vfs.mountroot.timeout="30"

# Disable ZFS prefetch for low-memory live systems (optional)
vfs.zfs.prefetch_disable="1"

# ⚠️ Only if building LIVE ISO with mfsroot
# mfsroot_load="YES"
# mfsroot_type="md_image"
# mfsroot_name="/data/ramdisk.ufs"
# vfs.root.mountfrom="ufs:/dev/md0"
